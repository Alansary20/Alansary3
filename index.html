<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1f0d">
<title>القرآن الكريم - أفضل القراء</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* scroll fix */
html{height:100%;height:-webkit-fill-available}
body{min-height:100%;min-height:-webkit-fill-available}

:root{--bg:#0a1f0d;--card:#1a3d1f;--card2:#1f4726;--bdr:rgba(180,145,55,0.18);--bdr2:rgba(180,145,55,0.35);--gold:#c9a032;--gold2:#e8c96a;--grn:#2d7a3a;--grn2:#3d9e4d;--txt:#f0ede4;--txt2:#b8c9b0;--txt3:#7a9070;--r:16px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:-webkit-fill-available;overflow:hidden}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--txt);display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 10% 0%,rgba(45,122,58,0.15) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 90% 100%,rgba(201,160,50,0.08) 0%,transparent 60%);pointer-events:none;z-index:0}
.view{display:none;flex-direction:column;height:100%;position:relative;z-index:1}.view.active{display:flex}
.view.active{display:flex}
.topbar{padding:14px 16px 10px;background:linear-gradient(180deg,rgba(10,31,13,.98),rgba(10,31,13,.85));backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);flex-shrink:0}
.trow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:10px}
.lc{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:'Amiri',serif;font-size:22px;color:var(--bg);font-weight:700;box-shadow:0 4px 16px rgba(201,160,50,.4)}
.lt{font-family:'Amiri',serif;font-size:19px;color:var(--gold2);font-weight:700}
.ls{font-size:10px;color:var(--txt3)}
.tacts{display:flex;gap:8px}
.ibtn{width:38px;height:38px;border-radius:11px;border:1px solid var(--bdr);background:rgba(255,255,255,.05);color:var(--gold2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.ibtn:active{transform:scale(.9)}
.sw{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:13px;padding:0 12px}
.sw input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-family:'Cairo',sans-serif;font-size:13px;padding:10px 0;direction:rtl}
.sw input::placeholder{color:var(--txt3)}
.tabs{display:flex;gap:6px;padding:10px 16px 2px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;position:relative;z-index:1}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--txt2);font-size:11.5px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab.on{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border-color:transparent;box-shadow:0 2px 12px rgba(201,160,50,.4)}
.hs{flex:1;min-height:0;overflow-y:scroll;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:80px}
.hs::-webkit-scrollbar{display:none}
.sh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px}
.sh h2{font-size:14px;font-weight:700;color:var(--txt);display:flex;align-items:center;gap:7px}
.sh h2::before{content:'';width:3px;height:14px;background:var(--gold);border-radius:2px;display:inline-block}
.sbd{font-size:11px;color:var(--txt3);background:rgba(255,255,255,.05);padding:2px 9px;border-radius:10px}
.frow{display:flex;gap:10px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none}
.frow::-webkit-scrollbar{display:none}
.fc{flex-shrink:0;width:140px;background:linear-gradient(160deg,rgba(29,70,36,.7),rgba(10,31,13,.9));border:1px solid var(--bdr);border-radius:var(--r);padding:12px 8px 10px;text-align:center;cursor:pointer;transition:transform .2s;position:relative}
.fc:active{transform:scale(.95)}
.flbl{position:absolute;top:7px;right:7px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);font-size:8px;font-weight:800;padding:2px 5px;border-radius:5px}
.fav2{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--card2),var(--grn2));margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid rgba(201,160,50,.35);position:relative}
.fflag{position:absolute;bottom:-2px;right:-2px;font-size:13px;background:var(--bg);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bdr)}
.fn{font-size:11.5px;font-weight:700;color:var(--txt);margin-bottom:3px;line-height:1.3}
.fc3{font-size:10px;color:var(--txt3);margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.chip{font-size:9px;padding:2px 5px;border-radius:5px;background:rgba(201,160,50,.12);color:var(--gold2);border:1px solid rgba(201,160,50,.18);white-space:nowrap}
.hr{height:1px;background:var(--bdr);margin:2px 16px 0}
.rl{display:flex;flex-direction:column;gap:6px;padding:0 14px 10px}
.rc{background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 12px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all .2s}

.rc:active{transform:scale(.98)}
.rav{width:50px;height:50px;border-radius:13px;flex-shrink:0;background:linear-gradient(135deg,var(--card2),var(--grn));display:flex;align-items:center;justify-content:center;font-size:22px;border:1.5px solid var(--bdr);position:relative}
.rfl{position:absolute;bottom:-3px;right:-3px;font-size:11px;background:var(--bg);border-radius:50%;width:17px;height:17px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bdr)}
.ri{flex:1;min-width:0}
.rn{font-size:13.5px;font-weight:700;color:var(--txt);margin-bottom:2px}
.rs{font-size:11px;color:var(--txt3);margin-bottom:4px}
.racts{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.pb{width:38px;height:38px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--grn),var(--grn2));color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.3);transition:all .2s}
.pb.now{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);animation:glow 1.8s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(201,160,50,.5)}50%{box-shadow:0 0 0 8px rgba(201,160,50,0)}}
.pb:active{transform:scale(.88)}
.fb{width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr);background:transparent;color:var(--txt3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.fb.on{color:var(--gold);border-color:var(--gold)}
.fb:active{transform:scale(.88)}
.empty{text-align:center;padding:40px 20px;color:var(--txt3)}
.empty .ei{font-size:38px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.7}
#recV .rtop{padding:14px 16px 10px;background:linear-gradient(180deg,rgba(10,31,13,.98),rgba(10,31,13,.88));backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);flex-shrink:0}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bbtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,.05);color:var(--txt);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rhn{font-size:15px;font-weight:800;color:var(--txt);flex:1}
.hero{margin:12px 14px;border-radius:var(--r);background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid var(--bdr2);padding:14px 16px;display:flex;align-items:center;gap:14px}
.hav{width:62px;height:62px;border-radius:16px;flex-shrink:0;background:linear-gradient(135deg,var(--grn),var(--grn2));display:flex;align-items:center;justify-content:center;font-size:28px;border:2px solid rgba(201,160,50,.4)}
.hn{font-size:17px;font-weight:800;color:var(--txt);margin-bottom:3px}
.hc{font-size:12px;color:var(--txt3);margin-bottom:8px}
.rwsel{display:flex;gap:6px;padding:8px 14px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.rwsel::-webkit-scrollbar{display:none}
.rtab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--txt2);font-size:11.5px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.rtab.on{background:linear-gradient(135deg,var(--card2),var(--grn));color:var(--gold2);border-color:var(--bdr2)}
.sfl{display:flex;align-items:center;gap:8px;padding:0 14px 10px;flex-shrink:0}
.sfin{flex:1;display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:12px;padding:0 10px}
.sfin input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-family:'Cairo',sans-serif;font-size:12px;padding:8px 0;direction:rtl}
.sfin input::placeholder{color:var(--txt3)}
.stbtns{display:flex;gap:4px}
.stb{padding:5px 10px;border-radius:9px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--txt3);font-size:11px;cursor:pointer;white-space:nowrap;transition:all .2s}
.stb.on{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border-color:transparent}
.ssl{flex:1;min-height:0;overflow-y:scroll;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 14px 80px}
.ssl::-webkit-scrollbar{display:none}
.si{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r);border:1px solid var(--bdr);background:rgba(255,255,255,.03);margin-bottom:6px;cursor:pointer;transition:all .2s}
.si:active{background:rgba(201,160,50,.07);transform:scale(.98)}

.si.na:active{transform:none}
.snum{width:38px;height:38px;border-radius:10px;flex-shrink:0;background:var(--card2);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gold2)}
.sinf{flex:1;min-width:0}
.sar{font-family:'Amiri',serif;font-size:16px;color:var(--txt);font-weight:700}
.sen{font-size:11px;color:var(--txt3);margin-top:1px}
.stype{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600}
.stype.m{background:rgba(45,122,58,.2);color:#6dbd7a}
.stype.k{background:rgba(201,160,50,.15);color:var(--gold2)}
.sps{display:flex;gap:5px}
.sp{width:36px;height:36px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--grn),var(--grn2));color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3);transition:all .2s;flex-shrink:0}
.sp.now{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);animation:glow 1.8s infinite}
.sp:active{transform:scale(.88)}
.sfv{width:30px;height:30px;border-radius:50%;border:1px solid var(--bdr);background:transparent;color:var(--txt3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.sfv.on{color:var(--gold);border-color:var(--gold)}
.sfv:active{transform:scale(.88)}
.mini{position:fixed;bottom:58px;left:0;right:0;z-index:200;background:linear-gradient(90deg,rgba(15,41,18,.97),rgba(26,61,31,.97));backdrop-filter:blur(20px);border-top:1px solid var(--bdr2);padding:8px 14px;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);cursor:pointer}
.mini.show{transform:translateY(0)}
.mpp{height:2px;background:rgba(255,255,255,.1);border-radius:1px;margin-bottom:8px}
.mpf{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:1px;width:0%}
.mr2{display:flex;align-items:center;gap:10px}
.mav{width:40px;height:40px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,var(--card2),var(--grn));display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--bdr2)}
.mi{flex:1;min-width:0}
.ms{font-size:13px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mrc{font-size:11px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc{display:flex;align-items:center;gap:6px}
.mb{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,.07);color:var(--txt);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mb.main{width:40px;height:40px;font-size:16px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);box-shadow:0 3px 12px rgba(201,160,50,.45)}
.mb:active{transform:scale(.88)}
.fp{position:fixed;inset:0;z-index:300;background:linear-gradient(160deg,#091a0c,#0f2912,#1a3d1f);display:none;flex-direction:column;overflow:hidden}
.fp.open{display:flex}
.fpbg{position:absolute;inset:0;background:radial-gradient(ellipse 100% 60% at 50% 30%,rgba(45,122,58,.2) 0%,transparent 70%);animation:bgp 4s ease-in-out infinite alternate;pointer-events:none}
@keyframes bgp{0%{opacity:.6}100%{opacity:1}}
.fpp2{position:absolute;inset:0;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9a032'%3E%3Cpath d='M30 0l8.7 15H21.3L30 0zm0 60l-8.7-15h17.4L30 60zM0 30l15-8.7V38.7L0 30zm60 0L45 38.7V21.3L60 30z'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.fpt{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:50px 20px 10px}
.fpdw{width:40px;height:40px;border-radius:12px;border:1px solid var(--bdr);background:rgba(255,255,255,.07);color:var(--txt);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.fpdw:active{transform:scale(.9)}
.fplbl{font-size:13px;color:var(--txt3);letter-spacing:1px}
.fpa{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:20px;flex:1;justify-content:center}
.fpm{width:200px;height:200px;border-radius:50%;background:linear-gradient(160deg,rgba(29,70,36,.8),rgba(10,31,13,.9));border:2px solid rgba(201,160,50,.3);display:flex;align-items:center;justify-content:center;font-size:90px;box-shadow:0 0 60px rgba(45,122,58,.3);margin-bottom:24px;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.bars{display:flex;align-items:flex-end;gap:4px;height:40px;margin-bottom:24px}
.bar{width:4px;border-radius:2px;background:linear-gradient(0deg,var(--gold),var(--gold2));animation:ba .8s ease-in-out infinite alternate}
@keyframes ba{0%{height:20%}100%{height:100%}}
.bar:nth-child(1){animation-delay:0s}.bar:nth-child(2){animation-delay:.1s}.bar:nth-child(3){animation-delay:.2s}.bar:nth-child(4){animation-delay:.05s}.bar:nth-child(5){animation-delay:.15s}.bar:nth-child(6){animation-delay:.25s}.bar:nth-child(7){animation-delay:.08s}.bar:nth-child(8){animation-delay:.18s}.bar:nth-child(9){animation-delay:.12s}.bar:nth-child(10){animation-delay:.22s}.bar:nth-child(11){animation-delay:.03s}.bar:nth-child(12){animation-delay:.17s}
.bars.paused .bar{animation-play-state:paused}
.fps2{font-family:'Amiri',serif;font-size:28px;color:var(--txt);font-weight:700;margin-bottom:5px;text-align:center}
.fpr2{font-size:14px;color:var(--txt2);margin-bottom:4px}
.fprw{font-size:12px;color:var(--txt3)}
.fppw{position:relative;z-index:1;padding:0 20px 10px}
.fppr{width:100%;height:4px;background:rgba(255,255,255,.12);border-radius:2px;cursor:pointer;margin-bottom:6px}
.fppf{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;width:0%;position:relative}
.fppf::after{content:'';position:absolute;right:-6px;top:-4px;width:12px;height:12px;border-radius:50%;background:var(--gold2);box-shadow:0 0 8px rgba(201,160,50,.6)}
.fptm{display:flex;justify-content:space-between;font-size:11px;color:var(--txt3)}
.fpcw{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:16px;padding:10px 20px 20px}
.fcb{width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.07);color:var(--txt);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.fcb.main{width:64px;height:64px;font-size:26px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);box-shadow:0 6px 24px rgba(201,160,50,.5)}
.fcb:active{transform:scale(.88)}
.fcb.on{color:var(--gold)}
.fpex{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:0 20px 30px}
.fxb{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--txt3)}
.fxb span{font-size:20px}
.fxb p{font-size:9px;font-weight:600}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(10,31,13,.97);backdrop-filter:blur(20px);border-top:1px solid var(--bdr);display:flex;align-items:center;height:58px}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:all .2s;padding:6px 0}
.bni .ni{font-size:20px;transition:transform .2s;line-height:1}
.bni .nl{font-size:9.5px;color:var(--txt3);font-weight:600}
.bni.on .nl{color:var(--gold2)}
.bni.on .ni{transform:scale(1.15)}
.bni:active .ni{transform:scale(.9)}

.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid var(--bdr2);border-radius:12px;padding:9px 18px;font-size:12.5px;color:var(--gold2);font-weight:600;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.rc{animation:fadeUp .3s ease both}
</style>
</head>
<body>
<div class="view active" id="homeV">
  <div class="topbar">
    <div class="trow">
      <div class="logo"><div class="lc">ق</div><div><div class="lt">القرآن الكريم</div><div class="ls">أفضل القراء</div></div></div>
      <div class="tacts">
        <button class="ibtn" id="reloadBtn" onclick="loadRC(true)" title="تحديث القراء">🔄</button>
      </div>
    </div>
    <div class="sw"><span style="color:var(--txt3);font-size:15px">🔍</span><input type="text" id="srch" placeholder="ابحث عن قارئ..." oninput="renderHome()"></div>
  </div>
  <div class="hs" id="hs">
    <div class="sh"><h2>القراء</h2><span class="sbd" id="rcnt">0</span></div>
    <div class="rl" id="rl"><div style="text-align:center;padding:30px;color:var(--txt3)"><span class="spin" style="font-size:28px;display:block;margin-bottom:8px">⏳</span><p>جارٍ تحميل القراء...</p></div></div>
  </div>
</div>

<div class="view" id="recV">
  <div class="rtop">
    <div class="brow"><button class="bbtn" onclick="goHome()">→</button><span class="rhn" id="rhn">—</span></div>
  </div>
  <div class="hero" id="hero"></div>
  <div class="rwsel" id="rwsel"></div>
  <div class="sfl">
    <div class="sfin"><span style="color:var(--txt3);font-size:13px">🔍</span><input type="text" id="ssrch" placeholder="ابحث عن سورة..." oninput="renderSurahs()"></div>
    <div class="stbtns">

let RC=[];
let S={tab:'all',stype:'all',fav:JSON.parse(localStorage.getItem('qfav')||'[]'),favS:JSON.parse(localStorage.getItem('qfavS')||'{}'),rc:null,rwi:0,si:0,playing:false,loop:false,sleepT:null,view:'home'};
const aud=document.getElementById('aud');

function enrich(r){const ci=cm(r.cc);return{...r,f:ci.f,t:ci.t,c:ci.n};}

// ═══ LOAD FROM API ═══
async function loadRC(force=false){
  const CK='qrc4';
  if(!force){const c=localStorage.getItem(CK);if(c){try{const d=JSON.parse(c);if(d.length>RC.length){RC=d;renderHome();showToast(`✅ ${RC.length} قارئ`);}return;}catch(e){}}}
  showToast('⏳ جارٍ تحميل القراء من الخادم...');
  try{
    const r=await fetch('https://www.mp3quran.net/api/v3/reciters?language=ar',{signal:AbortSignal.timeout(8000)});
    if(!r.ok)throw new Error();
    const d=await r.json();
    RC=processAPI(d.reciters||[]);
    localStorage.setItem(CK,JSON.stringify(RC));
    showToast(`✅ تم تحميل ${RC.length} قارئ`);
  }catch(e){
    if(RC.length===0){RC=STATIC.map(enrich);}
    showToast(`📱 ${RC.length} قارئ (وضع محلي)`);
  }
  renderHome();
}

function processAPI(list){
  const byId={};
  for(const r of list){
    if(!byId[r.id])byId[r.id]={...r,rw:[]};
    if(r.moshaf)for(const m of r.moshaf){
      byId[r.id].rw.push({n:m.name,u:m.server,sl:m.surah_list});
    }
  }
  return Object.values(byId).filter(r=>r.rw.length>0).map(r=>{
    const ci=cm((r.country||'').toUpperCase());
    return{id:r.id,n:r.name,cc:(r.country||'').toUpperCase(),f:ci.f,t:ci.t,c:ci.n,rw:r.rw.filter(x=>x.u)};
  });
}

function hasSurah(rc,rwi,num){
  if(!rc||!rc.rw)return true;
  const rw=rc.rw[rwi];
  if(!rw)return true;
  // no sl = all surahs available
  if(rw.sl===undefined||rw.sl===null||rw.sl==='')return true;
  // parse sl
  let list;
  try{
    if(typeof rw.sl==='string') list=rw.sl.split(',').map(x=>parseInt(x.trim())).filter(x=>!isNaN(x));
    else if(Array.isArray(rw.sl)) list=rw.sl.map(x=>parseInt(x)).filter(x=>!isNaN(x));
    else return true;
    if(!list.length)return true;
  }catch(e){return true;}
  return list.includes(parseInt(num));
}

function burl(base,num){return base.replace(/\/$/,'')+'/'+String(num).padStart(3,'0')+'.mp3';}

// ═══ RENDER HOME ═══
function getFil(){
  const q=document.getElementById('srch').value.trim();
  return RC.filter(r=>{
    const mt=true;
    const mq=!q||r.n.includes(q)||(r.c&&r.c.includes(q));
    return mt&&mq;
  });
}
function renderHome(){
  const fil=getFil();
  document.getElementById('rcnt').textContent=fil.length;
  
  
  renderRCList(fil);
}

function renderRCList(fil){
  const list=document.getElementById('rl');
  if(!fil.length){list.innerHTML='<div class="empty"><div class="ei">🔍</div><p>لا توجد نتائج</p></div>';return;}
  list.innerHTML=fil.map((r,i)=>{
    const isFav=S.fav.includes(r.id);
    const isNow=S.rc&&S.rc.id===r.id&&S.playing;
    return `<div class="rc " style="animation-delay:${Math.min(i,8)*.04}s" onclick="openRec(${r.id})"><div class="rav">🎙</div><div class="ri"><div class="rn">${r.n}</div><div class="chips">${r.rw.map(x=>`<span class="chip">${x.n}</span>`).join('')}</div></div><div class="racts"><button class="pb ${isNow?'now':''}" onclick="event.stopPropagation();quickPlay(${r.id})">${isNow?'⏸':'▶'}</button><button class="fb ${isFav?'on':''}" onclick="event.stopPropagation();toggleFav(${r.id})">${isFav?'❤':'♡'}</button></div></div>`;
  }).join('');
}

// ═══ RECITER VIEW ═══
function openRec(id){
  const r=RC.find(x=>x.id===id);if(!r)return;
  S.rc=r;S.rwi=0;S.view='reciter';
  document.getElementById('rhn').textContent=r.n;
  document.getElementById('hero').innerHTML=`<div class="hav">🎙</div><div><div class="hn">${r.n}</div><div class="chips">${r.rw.map(x=>`<span class="chip">${x.n}</span>`).join('')}</div></div>`;
  document.getElementById('rwsel').innerHTML=r.rw.map((x,i)=>`<div class="rtab ${i===0?'on':''}" onclick="selRw(${i},this)">${x.n}</div>`).join('');
  document.getElementById('ssrch').value='';
  document.querySelectorAll('.stb').forEach(b=>b.classList.toggle('on',b.dataset.st==='all'));
  S.stype='all';showView('recV');renderSurahs();
}
function selRw(idx,el){S.rwi=idx;document.querySelectorAll('.rtab').forEach(t=>t.classList.remove('on'));el.classList.add('on');renderSurahs();}
function renderSurahs(){
  const q=document.getElementById('ssrch').value.trim();
  const sc=document.getElementById('ssl');
  const r=S.rc;
  // فلترة السور المتاحة فقط
  let list=SH.filter(s=>{
    const rw=r&&r.rw&&r.rw[S.rwi];
    if(!rw||!rw.sl||rw.sl===null||rw.sl==='')return true;
    try{
      let arr;
      if(typeof rw.sl==='string')arr=rw.sl.split(',').map(x=>parseInt(x.trim()));
      else if(Array.isArray(rw.sl))arr=rw.sl.map(x=>parseInt(x));
      else return true;
      return arr.includes(parseInt(s[0]));
    }catch(e){return true;}
  });
  if(S.stype!=='all')list=list.filter(s=>s[4]===S.stype);
  if(q)list=list.filter(s=>s[1].includes(q)||s[2].toLowerCase().includes(q.toLowerCase())||String(s[0]).includes(q));
  if(!list.length){sc.innerHTML='<div class="empty"><div class="ei">🔍</div><p>لا توجد سور</p></div>';return;}
  sc.innerHTML=list.map(s=>{
    const[num,name,en,ayat,type]=s;
    const isNow=r&&S.rc.id===r.id&&S.si===num-1&&S.playing;
    const key=`${r.id}_${S.rwi}_${num}`;
    const isFav=S.favS[key];
    return `<div class="si" onclick="playSurah(${num-1})"><div class="snum">${num}</div><div class="sinf"><div class="sar">${name}</div><div class="sen">${en} · ${ayat} آية</div></div><div><span class="stype ${type==='m'?'m':'k'}">${type==='m'?'مدنية':'مكية'}</span></div><div class="sps"><button class="sp ${isNow?'now':''}" onclick="event.stopPropagation();playSurah(${num-1})">${isNow?'⏸':'▶'}</button><button class="sfv ${isFav?'on':''}" onclick="event.stopPropagation();toggleFavS('${key}',this)">${isFav?'❤':'♡'}</button></div></div>`;
  }).join('');
}
function setStype(el){S.stype=el.dataset.st;document.querySelectorAll('.stb').forEach(b=>b.classList.toggle('on',b===el));renderSurahs();}

// ═══ AUDIO ═══
function playSurah(idx){
  if(!S.rc)return;
  if(S.si===idx&&aud.src&&!aud.paused){togglePlay();return;}
  S.si=idx;
  const surah=SH[idx];
  const url=burl(S.rc.rw[S.rwi].u,surah[0]);
  aud.src=url;aud.load();
  aud.play().then(()=>{S.playing=true;updateUI();}).catch(()=>{
    showToast('⏳ جارٍ التحميل...');
    const onC=()=>{aud.play().then(()=>{S.playing=true;updateUI();}).catch(()=>showToast('⚠ تعذّر التشغيل'));aud.removeEventListener('error',onE);};
    const onE=()=>{showToast('⚠ هذه السورة غير متاحة');aud.removeEventListener('canplaythrough',onC);};
    aud.addEventListener('canplaythrough',onC,{once:true});
    aud.addEventListener('error',onE,{once:true});
  });
}
function quickPlay(id){
  const r=RC.find(x=>x.id===id);if(!r)return;
  if(S.rc&&S.rc.id===id&&aud.src){togglePlay();return;}
  S.rc=r;S.rwi=0;
  const fi=SH.findIndex(s=>hasSurah(r,0,s[0]));
  playSurah(fi>=0?fi:0);
}
function togglePlay(){if(aud.paused){aud.play().catch(()=>{});S.playing=true;}else{aud.pause();S.playing=false;}updateUI();}
function nextS(){for(let i=1;i<=114;i++){const idx=(S.si+i)%114;if(hasSurah(S.rc,S.rwi,SH[idx][0])){playSurah(idx);return;}}}
function prevS(){for(let i=1;i<=114;i++){const idx=(S.si-i+114)%114;if(hasSurah(S.rc,S.rwi,SH[idx][0])){playSurah(idx);return;}}}
function toggleLoop(){S.loop=!S.loop;aud.loop=S.loop;document.getElementById('loopB').classList.toggle('on',S.loop);showToast(S.loop?'🔁 التكرار مفعّل':'التكرار معطّل');}
function toggleSleep(){if(S.sleepT){clearTimeout(S.sleepT);S.sleepT=null;document.getElementById('sleepB').classList.remove('on');showToast('😴 مؤقت النوم معطّل');}else{S.sleepT=setTimeout(()=>{aud.pause();S.playing=false;updateUI();showToast('😴 توقف التشغيل');},30*60*1000);document.getElementById('sleepB').classList.add('on');showToast('😴 سيتوقف بعد 30 دقيقة');}}
function seekFP(e){if(!aud.duration)return;const rect=document.getElementById('fppr').getBoundingClientRect();aud.currentTime=((e.clientX-rect.left)/rect.width)*aud.duration;}
aud.addEventListener('timeupdate',()=>{if(!aud.duration)return;const p=(aud.currentTime/aud.duration)*100;document.getElementById('mpf').style.width=p+'%';document.getElementById('fppf').style.width=p+'%';document.getElementById('fpc').textContent=fmt(aud.currentTime);document.getElementById('fpd').textContent=fmt(aud.duration-aud.currentTime);});
aud.addEventListener('ended',()=>{if(!S.loop)nextS();});
aud.addEventListener('play',()=>{S.playing=true;document.getElementById('bars').classList.remove('paused');updateUI();});
aud.addEventListener('pause',()=>{S.playing=false;document.getElementById('bars').classList.add('paused');updateUI();});
aud.addEventListener('error',()=>{S.playing=false;updateUI();});
function fmt(s){if(!s||isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return`${m}:${sec<10?'0':''}${sec}`;}
function updateUI(){
  const r=S.rc;if(!r)return;
  const surah=SH[S.si];const rw=r.rw[S.rwi];
  document.getElementById('mini').classList.add('show');
  document.getElementById('msur').textContent=surah[1];
  document.getElementById('mrc2').textContent=`${r.n} · ${rw.n}`;
  document.getElementById('mbtn').textContent=S.playing?'⏸':'▶';
  document.getElementById('fps').textContent=surah[1];
  document.getElementById('fpr').textContent=r.n;
  document.getElementById('fprw').textContent=rw.n;
  document.getElementById('fpbtn').textContent=S.playing?'⏸':'▶';
  const key=`${r.id}_${S.rwi}_${surah[0]}`;
  document.getElementById('fpfav').textContent=S.favS[key]?'❤':'♡';
  renderHome();
  if(S.view==='reciter')renderSurahs();
}
function openFP(){document.getElementById('fp').classList.add('open');}
function closeFP(){document.getElementById('fp').classList.remove('open');}
function shareNow(){if(!S.rc){showToast('⚠ لا يوجد تشغيل');return;}const s=SH[S.si];const txt=`🎙 سورة ${s[1]} — ${S.rc.n} — ${S.rc.rw[S.rwi].n}`;if(navigator.share)navigator.share({title:`القرآن - ${s[1]}`,text:txt,url:window.location.href}).catch(()=>{});else if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>showToast('📤 تم النسخ'));}
function copyLink(){if(!aud.src){showToast('⚠ لا يوجد تشغيل');return;}if(navigator.clipboard)navigator.clipboard.writeText(aud.src).then(()=>showToast('🔗 تم نسخ رابط الصوت'));}
function downloadCur(){if(!aud.src){showToast('⚠ لا يوجد تشغيل');return;}const a=document.createElement('a');a.href=aud.src;a.download='';a.target='_blank';a.click();showToast('⬇ يتم التنزيل...');}
function addPL(){showToast('➕ تمت الإضافة');}
function toggleFav(id){const i=S.fav.indexOf(id);if(i===-1)S.fav.push(id);else S.fav.splice(i,1);localStorage.setItem('qfav',JSON.stringify(S.fav));renderHome();}
function toggleFavSurah(){if(!S.rc)return;const key=`${S.rc.id}_${S.rwi}_${SH[S.si][0]}`;if(S.favS[key])delete S.favS[key];else S.favS[key]=true;localStorage.setItem('qfavS',JSON.stringify(S.favS));updateUI();}
function toggleFavS(key,btn){if(S.favS[key]){delete S.favS[key];btn.textContent='♡';btn.classList.remove('on');}else{S.favS[key]=true;btn.textContent='❤';btn.classList.add('on');}localStorage.setItem('qfavS',JSON.stringify(S.favS));}

function setTab(el){S.tab=el.dataset.t;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t===el));renderHome();document.getElementById('hs').scrollTop=0;}
function showView(v){document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));document.getElementById(v).classList.add('active');}
function goHome(){S.view='home';showView('homeV');renderHome();}
function switchNav(idx){document.querySelectorAll('.bni').forEach((el,i)=>el.classList.toggle('on',i===idx));}
let toastT;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2500);}

// عرض القراء المحليين فوراً بدون انتظار
RC = STATIC.map(enrich);
renderHome();
// ثم حاول تحميل المزيد من الـ API في الخلفية
setTimeout(()=>loadRC(false), 100);
</script>
</body>
</html>
